name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      # Don't cancel the sibling Node version when one flakes: a single-job flake
      # otherwise fails the whole run and renders the cancelled job's in-flight
      # tests as false failures (CI reliability analysis, 2026-07-19).
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Audit dependencies (high+)
        run: npm audit --audit-level=high
      # Run against an empty CCXRAY_HOME so a test that forgets to isolate
      # (rule 1 in docs/testing.md) can't read the real ~/.ccxray and starts
      # from an empty log dir. $HOME is left untouched so puppeteer's Chrome
      # cache (~/.cache/puppeteer) stays intact for the browser e2e tests.
      - name: Run tests with isolated empty CCXRAY_HOME
        run: |
          mkdir -p "$RUNNER_TEMP/empty-ccxray"
          CCXRAY_HOME="$RUNNER_TEMP/empty-ccxray" npm test
