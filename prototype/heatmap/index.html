<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ccxray — Context Heatmap Swimlane</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0d1117;
  color: #e6edf3;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  font-size: 13px;
  line-height: 1.4;
  overflow-x: hidden;
}

/* --- Top bar --- */
.topbar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 12px 20px;
  background: #161b22;
  border-bottom: 1px solid #30363d;
  position: sticky;
  top: 0;
  z-index: 100;
}
.topbar h1 {
  font-size: 15px;
  font-weight: 600;
  color: #e6edf3;
  white-space: nowrap;
}
.topbar h1 span { color: #8b949e; font-weight: 400; }

/* Session picker */
.session-picker {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.session-tab {
  padding: 4px 12px;
  border-radius: 6px;
  border: 1px solid #30363d;
  background: transparent;
  color: #8b949e;
  cursor: pointer;
  font-size: 12px;
  transition: all 0.15s;
}
.session-tab:hover { border-color: #58a6ff; color: #c9d1d9; }
.session-tab.active {
  background: #1f6feb33;
  border-color: #58a6ff;
  color: #58a6ff;
}

/* --- Summary bar --- */
.summary-bar {
  display: flex;
  gap: 24px;
  padding: 10px 20px;
  background: #161b22;
  border-bottom: 1px solid #30363d;
}
.summary-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: #8b949e;
}
.summary-item .value {
  font-weight: 600;
  color: #e6edf3;
}
.summary-item .value.hot { color: #f85149; }
.summary-item .value.warm { color: #d29922; }
.summary-item .value.cool { color: #3fb950; }
.model-chip {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 11px;
  font-weight: 500;
  border: 1px solid #30363d;
  background: #21262d;
  color: #c9d1d9;
}
.model-chip.opus { border-color: #7c3aed55; color: #a78bfa; }
.model-chip.sonnet { border-color: #2563eb55; color: #60a5fa; }
.model-chip.haiku { border-color: #0d948855; color: #34d399; }

/* --- Main viz area --- */
.viz-container {
  display: flex;
  overflow-x: auto;
  overflow-y: auto;
  max-height: calc(100vh - 110px);
}
.lane-headers {
  flex-shrink: 0;
  background: #161b22;
  border-right: 1px solid #30363d;
  z-index: 10;
  position: sticky;
  left: 0;
}
.lane-header {
  padding: 8px 14px;
  border-bottom: 1px solid #21262d;
  display: flex;
  flex-direction: column;
  gap: 3px;
  justify-content: center;
}
.lane-header .agent-name {
  font-weight: 600;
  font-size: 13px;
  color: #e6edf3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 200px;
}
.lane-header .agent-meta {
  font-size: 11px;
  color: #8b949e;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.type-badge {
  display: inline-block;
  padding: 0 5px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.type-badge.orchestrator { background: #1f6feb33; color: #58a6ff; }
.type-badge.fork { background: #7c3aed22; color: #a78bfa; }
.type-badge.default { background: #21262d; color: #8b949e; }
.type-badge.codex { background: #d2992233; color: #d29922; }

.peak-badge {
  font-size: 10px;
  font-weight: 600;
  padding: 0 4px;
  border-radius: 3px;
}

.svg-area {
  flex: 1;
  min-width: 0;
}

/* --- Tooltip --- */
.tooltip {
  position: fixed;
  pointer-events: none;
  z-index: 200;
  background: #1c2128;
  border: 1px solid #444c56;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 12px;
  line-height: 1.5;
  color: #c9d1d9;
  max-width: 340px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  display: none;
}
.tooltip .tt-row {
  display: flex;
  justify-content: space-between;
  gap: 16px;
}
.tooltip .tt-label { color: #8b949e; }
.tooltip .tt-value { font-weight: 600; color: #e6edf3; text-align: right; }
.tooltip .tt-divider {
  border-top: 1px solid #30363d;
  margin: 5px 0;
}

/* --- Color legend --- */
.legend {
  display: flex;
  align-items: center;
  gap: 3px;
  font-size: 11px;
  color: #8b949e;
  margin-left: auto;
}
.legend-swatch {
  width: 14px;
  height: 10px;
  border-radius: 2px;
}
.legend-label {
  margin: 0 4px 0 1px;
  font-size: 10px;
}

/* --- Empty state --- */
.empty-state {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 300px;
  color: #8b949e;
  font-size: 14px;
}
</style>
</head>
<body>
<div class="topbar">
  <h1>Context Heatmap <span>Swimlane</span></h1>
  <div class="session-picker" id="sessionPicker"></div>
  <div class="legend">
    <span style="margin-right:4px">Context:</span>
    <div class="legend-swatch" style="background:#1a365d"></div><span class="legend-label">0-20%</span>
    <div class="legend-swatch" style="background:#0d4f4f"></div><span class="legend-label">20-40%</span>
    <div class="legend-swatch" style="background:#4a5d23"></div><span class="legend-label">40-60%</span>
    <div class="legend-swatch" style="background:#7c4a1a"></div><span class="legend-label">60-80%</span>
    <div class="legend-swatch" style="background:#7c1a1a"></div><span class="legend-label">80-100%</span>
  </div>
</div>
<div class="summary-bar" id="summaryBar"></div>
<div class="viz-container">
  <div class="lane-headers" id="laneHeaders"></div>
  <div class="svg-area" id="svgArea"></div>
</div>
<div class="tooltip" id="tooltip"></div>

<script src="heatmap.js"></script>
</body>
</html>
