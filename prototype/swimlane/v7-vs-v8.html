<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>v7 vs v8 — Swimlane Turn Bar Comparison</title>
<style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--dim:#8b949e;--accent:#58a6ff}
*{margin:0;padding:0;box-sizing:border-box}
body{font:13px/1.4 'SF Mono','Cascadia Code',monospace;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

.split{flex:1;display:flex;flex-direction:column;min-height:0;border-bottom:2px solid var(--accent)}
.split:last-child{border-bottom:none}
.split-head{display:flex;align-items:center;gap:10px;padding:6px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.split-head .ver{font-weight:700;font-size:14px}
.split-head .ver.v7c{color:#bc8cff}
.split-head .ver.v8c{color:#3fb950}
.split-head .desc{color:var(--dim);font-size:11px}
.split-head .motto{margin-left:auto;font-size:10px;color:var(--dim)}

.panel{flex:1;display:flex;min-height:0;overflow:hidden}
.lane-heads{width:180px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto}
.lane-chart{flex:1;overflow-x:auto;overflow-y:hidden}
.lane-chart-inner{padding:0 12px}

/* lane head */
.lh{padding:6px 10px;cursor:pointer;border-left:2px solid transparent}
.lh:hover{background:var(--surface)}
.lh.sel{background:var(--surface);border-left-color:var(--accent)}
.lh .l1{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden}
.lh .l2{font-size:9px;color:var(--dim);display:flex;gap:6px}
.model-chip{font-size:9px;padding:0 4px;border-radius:2px}

/* shared bar/track styles */
.lane-row{padding-top:4px}
.lane-box{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:4px 4px 0 0;border-bottom:none}
.track{position:relative;height:8px;background:var(--surface);border:1px solid var(--border);border-top:none}
.track:last-child{border-radius:0 0 4px 4px}
.track-label{position:absolute;left:-4px;transform:translateX(-100%);font-size:7px;color:var(--dim);line-height:8px;white-space:nowrap}

/* v7 bar */
.tb-v7{position:absolute;bottom:0;min-width:4px;margin-right:1px;border-radius:1px 1px 0 0;cursor:pointer;transition:filter .15s}
.tb-v7:hover{filter:brightness(1.3);z-index:20}

/* v8 bar (stacked cache read + write) */
.tb-v8{position:absolute;bottom:0;min-width:4px;margin-right:1px;border-radius:1px 1px 0 0;cursor:pointer;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden;transition:opacity .12s}
.tb-v8 .cr{background:#58a6ff}
.tb-v8 .cw{background:#f0883e}
/* v8 spotlight: dims all elements, hovered column stays bright */
.lane-row.spotlight .tb-v8,
.lane-row.spotlight .cost-bar,
.lane-row.spotlight .ev-dot{opacity:0.2}
.lane-row.spotlight .tb-v8.hl,
.lane-row.spotlight .cost-bar.hl,
.lane-row.spotlight .ev-dot.hl{opacity:1}

/* v8 cursor guide: per-lane, only shown via .guide-on (JS-controlled, not auto from .spotlight) */
.cursor-guide{position:absolute;top:0;bottom:0;width:1px;background:rgba(230,237,243,0.25);pointer-events:none;z-index:30;display:none}
.lane-row .cursor-guide.guide-on{display:block}

/* v8 cross-lane dim: non-focused lanes fade when one is locked */
.lane-row.dimmed{opacity:0.35;transition:opacity .15s}
.lane-row.dimmed:hover{opacity:0.7}
/* matching lane-head dim */
.lh.dimmed{opacity:0.4;transition:opacity .15s}
.lh.dimmed:hover{opacity:0.7}

/* v8 global cursor guide: spans entire chart area, positioned by JS */
.global-guide{position:absolute;top:0;bottom:0;width:1px;background:rgba(88,166,255,0.2);pointer-events:none;z-index:28;display:none}

/* v8 cost mini bar */
.cost-bar{position:absolute;bottom:1px;min-width:3px;border-radius:1px 1px 0 0;transition:opacity .12s}

/* v8 track labels (expanded) */
.trk-lbl{position:absolute;right:4px;font-size:7px;line-height:8px;color:var(--dim);pointer-events:none;z-index:5}

/* event dots */
.ev-dot{position:absolute;bottom:2px;width:4px;height:4px;cursor:pointer;transition:opacity .12s}

/* vertical lines */
.vline{position:absolute;top:0;bottom:0;width:0;pointer-events:none}

/* tooltip */
#tt{position:fixed;display:none;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:8px 10px;font-size:11px;z-index:200;pointer-events:none;max-width:300px;box-shadow:0 2px 8px rgba(0,0,0,0.5);line-height:1.6}
#tt .r{display:flex;justify-content:space-between;gap:16px}
#tt .l{color:var(--dim)}
#tt .v{font-weight:600}
#tt .v.warn{color:#d29922}
#tt .v.danger{color:#f85149}
#tt .v.good{color:#3fb950}

/* threshold lines */
.thresh{stroke:#8b949e;stroke-opacity:0.35;stroke-dasharray:3 3}

@keyframes ribbonPulse{0%,100%{stroke-opacity:1}50%{stroke-opacity:.55}}
.dng-contour{animation:ribbonPulse 2s ease-in-out infinite}
</style></head><body>

<!-- v7 panel -->
<div class="split">
  <div class="split-head">
    <span class="ver v7c">v7 waterline</span>
    <span class="desc">bar height=cost · hue=zone · 8px greyscale ctx ribbon · events mixed</span>
    <span class="motto">高=貴 · 色=區 · 位=勢 · 線=界 · 點=事</span>
  </div>
  <div class="panel">
    <div class="lane-heads" id="heads-v7"></div>
    <div class="lane-chart" id="chart-v7"><div class="lane-chart-inner" id="inner-v7"></div></div>
  </div>
</div>

<!-- v8 panel -->
<div class="split">
  <div class="split-head">
    <span class="ver v8c">v8 ctx-split</span>
    <span class="desc">bar height=ctx% · cache read/write split · zone border · cost 8px · 4 event tracks · full-lane spotlight</span>
    <span class="motto">高=滿 · 色=區 · 位=勢 · 線=界 · 點=事 · 橘=貴</span>
  </div>
  <div class="panel">
    <div class="lane-heads" id="heads-v8"></div>
    <div class="lane-chart" id="chart-v8" style="position:relative"><div class="global-guide" id="v8-global-guide"></div><div class="lane-chart-inner" id="inner-v8"></div></div>
  </div>
</div>

<div id="tt"></div>
<script src="data.js"></script>
<script>
// ── shared utils ──
function shortModel(m){return(m||'?').replace('claude-','').replace(/-\d{8}$/,'');}
function ctxPct(e){return Math.min(100,e.ctxUsed/(e.maxCtx||200000)*100);}
function cacheHitPct(e){var t=e.input+e.cacheRead+e.cacheCreate;return t>0?e.cacheRead/t*100:0;}
function fmtTokens(n){return n>=1000?(n/1000).toFixed(1)+'k':String(n);}

function buildLanes(){
  var main=[],sub1=[],sub2=[];
  DATA.forEach(function(e){
    var haiku=(e.model||'').indexOf('haiku')>=0;
    if(!haiku)main.push(e);
    else if(e.num<=58)sub1.push(e);
    else sub2.push(e);
  });
  return[
    {key:'main',label:'claude-code',turns:main,isSub:false},
    {key:'sub1',label:'Explore',turns:sub1,isSub:true},
    {key:'sub2',label:'code-reviewer',turns:sub2,isSub:true}
  ];
}

function detectEvents(e,prev){
  var evts=[];
  var inT=e.input+e.cacheRead+e.cacheCreate;
  var ch=inT>0?e.cacheRead/inT*100:100;
  var cp=ctxPct(e);
  if(e.hasErr)evts.push('error');
  if(ch<50&&inT>1000)evts.push('cache-miss');
  if(cp>=80)evts.push('ctx80');
  if(prev&&prev.ctxUsed>0&&e.ctxUsed<prev.ctxUsed*0.7)evts.push('compaction');
  return evts;
}

// v7 zone color
function zoneColor(cp){return cp>=80?'#f85149':cp>=40?'#d29922':'#3fb950';}

// v7 greyscale ramp
function greyL(L){var Y=Math.pow((L+16)/116,3);var c=Y<=0.0031308?12.92*Y:1.055*Math.pow(Y,1/2.4)-0.055;var v=Math.round(Math.max(0,Math.min(1,c))*255);return'rgb('+v+','+v+','+v+')';}
function ribbonColor(cp){return cp>=80?'#ff6b6b':greyL(28+(Math.min(cp,80)/80)*36);}

// ── timeline geometry ──
var LANES=buildLanes();
var tMin=Infinity,tMax=-Infinity;
DATA.forEach(function(e){var ts=Number(e.ts)||0;if(ts<tMin)tMin=ts;var end=ts+(parseFloat(e.dur)||0)*1000;if(end>tMax)tMax=end;});
var tR=tMax-tMin||1;

function getW(){return Math.max(document.querySelector('.lane-chart').clientWidth-24,DATA.length*6);}
function X(ts,W){return((ts-tMin)/tR)*W;}
function barX(e,W){return X(Number(e.ts)||0,W);}
function barW(e,W){return Math.max(4,((parseFloat(e.dur)||0)*1000/tR)*W);}

// model switches (main lane only)
var switches=[];
var main=LANES[0].turns;
for(var i=1;i<main.length;i++){if(main[i].model&&main[i-1].model&&main[i].model!==main[i-1].model)switches.push(main[i].ts);}

// ── V7 RENDER ──
var selV7=null;
function renderV7(){
  var W=getW(),H=40;
  var heads='',chart='';
  LANES.forEach(function(lane){
    var turns=lane.turns;
    var cost=turns.reduce(function(s,t){return s+t.cost;},0);
    var mc={};turns.forEach(function(e){mc[e.model]=(mc[e.model]||0)+1;});
    var dom=Object.entries(mc).sort(function(a,b){return b[1]-a[1];})[0];
    var isHaiku=(dom[0]||'').indexOf('haiku')>=0;
    var chip='<span class="model-chip" style="background:'+(isHaiku?'#f0883e22;color:#f0883e':'#58a6ff22;color:#58a6ff')+'">'+shortModel(dom[0])+'</span>';
    var exp=selV7===lane.key;
    // v7 heights: 4pad + 40bar + 8ribbon + 8event = 60; expanded +16 (cache+cost ribbons)
    var rowH=exp?76:60;
    heads+='<div class="lh'+(exp?' sel':'')+'" data-ver="v7" data-lane="'+lane.key+'" style="height:'+rowH+'px"><div class="l1">'+(exp?'▼':'▶')+' '+lane.label+'</div><div class="l2"><span>'+turns.length+'t</span><span>$'+cost.toFixed(2)+'</span>'+chip+'</div></div>';

    var row='<div class="lane-row" style="height:'+rowH+'px">';
    // bar area
    row+='<div class="lane-box" style="width:'+W+'px;height:'+H+'px">';
    if(!lane.isSub)switches.forEach(function(ts){row+='<div class="vline" style="left:'+X(ts,W).toFixed(1)+'px;border-left:1px dashed rgba(139,148,158,0.4)"></div>';});
    var maxC=0;turns.forEach(function(e){if(e.cost>maxC)maxC=e.cost;});if(!maxC)maxC=0.01;
    turns.forEach(function(e){
      var x=barX(e,W),bw=barW(e,W);
      var h=Math.max(2,Math.round((e.cost/maxC)*H));
      var cp=ctxPct(e);
      row+='<div class="tb-v7" style="left:'+x.toFixed(1)+'px;width:'+bw.toFixed(1)+'px;height:'+h+'px;background:'+zoneColor(cp)+'"></div>';
    });
    row+='</div>';

    // ctx ribbon (v7 greyscale waterline)
    row+=buildRibbon(turns,W,'rg7-'+lane.key,{
      get:ctxPct,color:ribbonColor,danger:function(v){return v>=80;},
      dangerStroke:'#ff6b6b',pulse:true,thresholdV:80
    });

    // event track (collapsed single)
    row+='<div class="track" style="width:'+W+'px">';
    turns.forEach(function(e,idx){
      var evts=detectEvents(e,idx>0?turns[idx-1]:null);
      var x=barX(e,W);
      evts.forEach(function(ev,ei){
        var st=v7DotStyle(ev);
        row+='<div class="ev-dot" style="left:'+(x+ei*6).toFixed(1)+'px;'+st+'"></div>';
      });
    });
    row+='</div>';
    row+='</div>';
    chart+=row;
  });
  document.getElementById('heads-v7').innerHTML=heads;
  document.getElementById('inner-v7').innerHTML=chart;
  document.getElementById('inner-v7').style.width=(W+24)+'px';
}

function v7DotStyle(ev){
  var m={'error':'background:#f85149;border-radius:1px','cache-miss':'background:#4dd0e1;border-radius:50%','ctx80':'background:#ff6b6b;border-radius:50%','compaction':'background:#d29922;width:0;height:0;border-left:3px solid transparent;border-right:3px solid transparent;border-top:4px solid #d29922;border-radius:0'};
  return m[ev]||'background:var(--dim);border-radius:50%';
}

// ── V8 RENDER ──
var selV8=null;
var hoverTurnIdx=null; // for spotlight

// v8 event config: track → [{name, shape, color}]
var V8_TRACKS=[
  {key:'faults',label:'Faults',events:[
    {name:'error',shape:'square',color:'#f85149'},
    {name:'rate-limit',shape:'triangle',color:'#ff9b8e'},
    {name:'retry',shape:'circle',color:'#a82828'},
    {name:'perm-denied',shape:'square',color:'#ff7b72'}
  ]},
  {key:'context',label:'Context',events:[
    {name:'compaction',shape:'triangle',color:'#bc8cff'},
    {name:'cache-miss',shape:'circle',color:'#d2a8ff'},
    {name:'ctx80',shape:'square',color:'#8957e5'}
  ]},
  {key:'mutations',label:'Mutations',events:[
    {name:'file-write',shape:'circle',color:'#2ea043'},
    {name:'git-commit',shape:'triangle',color:'#56d364'},
    {name:'danger-bash',shape:'square',color:'#238636'}
  ]},
  {key:'safety',label:'Safety',events:[
    {name:'credential',shape:'square',color:'#b87800'},
    {name:'perm-prompt',shape:'triangle',color:'#f0c746'},
    {name:'unsafe-blocked',shape:'circle',color:'#d29922'}
  ]}
];

function v8EventTrack(ev){
  for(var i=0;i<V8_TRACKS.length;i++){
    var t=V8_TRACKS[i];
    for(var j=0;j<t.events.length;j++){if(t.events[j].name===ev)return{track:t.key,idx:i,evt:t.events[j]};}
  }
  return null;
}

function dotHtml(shape,color,x,dataAttr){
  dataAttr=dataAttr||'';
  if(shape==='square')return'<div class="ev-dot" '+dataAttr+' style="left:'+x.toFixed(1)+'px;background:'+color+';border-radius:1px"></div>';
  if(shape==='triangle')return'<div class="ev-dot" '+dataAttr+' style="left:'+x.toFixed(1)+'px;width:0;height:0;border-left:3px solid transparent;border-right:3px solid transparent;border-bottom:4px solid '+color+';border-radius:0;background:none"></div>';
  return'<div class="ev-dot" '+dataAttr+' style="left:'+x.toFixed(1)+'px;background:'+color+';border-radius:50%"></div>';
}

// ponytail: simulate file-write events from data (every ~3 turns that aren't errors)
function v8Events(e,prev,idx){
  var evts=[];
  var inT=e.input+e.cacheRead+e.cacheCreate;
  var ch=inT>0?e.cacheRead/inT*100:100;
  var cp=ctxPct(e);
  if(e.hasErr)evts.push('error');
  if(ch<50&&inT>1000)evts.push('cache-miss');
  if(cp>=80)evts.push('ctx80');
  if(prev&&prev.ctxUsed>0&&e.ctxUsed<prev.ctxUsed*0.7)evts.push('compaction');
  // simulate mutations (file writes ~every 3rd non-error turn)
  if(!e.hasErr&&idx%3===1)evts.push('file-write');
  // simulate git commit occasionally
  if(!e.hasErr&&idx%12===5)evts.push('git-commit');
  return evts;
}

function renderV8(){
  var W=getW(),H=44;
  var heads='',chart='';

  LANES.forEach(function(lane){
    var turns=lane.turns;
    var cost=turns.reduce(function(s,t){return s+t.cost;},0);
    var mc={};turns.forEach(function(e){mc[e.model]=(mc[e.model]||0)+1;});
    var dom=Object.entries(mc).sort(function(a,b){return b[1]-a[1];})[0];
    var isHaiku=(dom[0]||'').indexOf('haiku')>=0;
    var chip='<span class="model-chip" style="background:'+(isHaiku?'#f0883e22;color:#f0883e':'#58a6ff22;color:#58a6ff')+'">'+shortModel(dom[0])+'</span>';
    var exp=selV8===lane.key;
    // v8 heights: 4pad + 44bar + 8cost + (collapsed:8 / expanded:32) = 64/88
    // zone removed as separate track → now 2px border on each bar
    var evH=exp?32:8;
    var rowH=4+H+8+evH;
    var trackInfo=exp?'▼ 4/4':'▶ 2/4';
    heads+='<div class="lh'+(exp?' sel':'')+'" data-ver="v8" data-lane="'+lane.key+'" style="height:'+rowH+'px">'
      +'<div class="l1">'+lane.label+'</div>'
      +'<div class="l2"><span>'+turns.length+'t</span><span>$'+cost.toFixed(2)+'</span>'+chip
      +'<span style="color:var(--accent);font-size:8px">'+trackInfo+'</span></div>';
    // track labels when expanded
    if(exp){
      // labels positioned relative to lane head, offset = 4pad + 44bar + 8cost = 56
      var trkColors=['#f85149','#bc8cff','#2ea043','#b87800'];
      var trkNames=['faults','ctx','mutate','safety'];
      for(var ti=0;ti<4;ti++){
        heads+='<div style="position:relative;height:8px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px"><span style="font-size:7px;color:'+trkColors[ti]+'">'+trkNames[ti]+'</span></div>';
      }
    }
    heads+='</div>';

    // row with position:relative for cursor guide
    var row='<div class="lane-row" data-ver="v8" data-lane="'+lane.key+'" style="height:'+rowH+'px;position:relative">';
    // cursor guide (hidden until hover) + lock ghost marker
    row+='<div class="cursor-guide" data-role="guide"></div>';
    row+='<div data-role="lock-ghost" style="display:none;position:absolute;top:0;bottom:0;width:0;border-left:2px dashed rgba(88,166,255,0.4);pointer-events:none;z-index:29"></div>';

    // ── ctx% bars (44px) with cache split + 40%/80% threshold lines ──
    row+='<div class="lane-box" style="width:'+W+'px;height:'+H+'px">';
    // zone threshold lines: 40% gray, 80% red (behind bars)
    var y40=H-Math.round(H*0.4)+0.5; // 26.9 from top
    var y80=H-Math.round(H*0.8)+0.5; // 9.3 from top
    row+='<svg style="position:absolute;top:0;left:0;width:'+W+'px;height:'+H+'px;pointer-events:none">'
      +'<line x1="0" x2="'+(W-20)+'" y1="'+y40+'" y2="'+y40+'" stroke="#8b949e" stroke-opacity="0.35" stroke-dasharray="3 3" shape-rendering="crispEdges"/>'
      +'<line x1="0" x2="'+(W-20)+'" y1="'+y80+'" y2="'+y80+'" stroke="#f85149" stroke-opacity="0.40" stroke-dasharray="3 3" shape-rendering="crispEdges"/>'
      +'<text x="'+(W-3)+'" y="'+(y40+3)+'" text-anchor="end" font-size="7" fill="#8b949e" opacity="0.7">40</text>'
      +'<text x="'+(W-3)+'" y="'+(y80+3)+'" text-anchor="end" font-size="7" fill="#f85149" opacity="0.7">80</text>'
      +'</svg>';
    if(!lane.isSub)switches.forEach(function(ts){row+='<div class="vline" style="left:'+X(ts,W).toFixed(1)+'px;border-left:1px dashed rgba(139,148,158,0.4)"></div>';});

    turns.forEach(function(e,idx){
      var x=barX(e,W),bw=barW(e,W);
      var cp=ctxPct(e);
      var h=Math.max(2,Math.round((cp/100)*H));
      var inT=e.input+e.cacheRead+e.cacheCreate;
      var crPct=inT>0?e.cacheRead/inT:0;
      var cwPct=inT>0?e.cacheCreate/inT:0;
      var crH=Math.round(h*crPct);
      var cwH=Math.round(h*cwPct);
      if(e.cacheCreate>0&&cwH<1)cwH=1;
      var riH=Math.max(0,h-crH-cwH);
      row+='<div class="tb-v8" data-tidx="'+idx+'" style="left:'+x.toFixed(1)+'px;width:'+bw.toFixed(1)+'px;height:'+h+'px">';
      if(riH>0)row+='<div style="height:'+riH+'px;background:#8b5cf6"></div>';
      if(cwH>0)row+='<div class="cw" style="height:'+cwH+'px"></div>';
      if(crH>0)row+='<div class="cr" style="height:'+crH+'px"></div>';
      row+='</div>';
    });
    row+='</div>';

    // ── cost track (8px mini bars) ──
    var maxC=0;turns.forEach(function(e){if(e.cost>maxC)maxC=e.cost;});if(!maxC)maxC=0.01;
    var sorted=turns.slice().sort(function(a,b){return a.cost-b.cost;});
    var median=sorted[Math.floor(sorted.length/2)].cost||0.01;
    row+='<div class="track" style="width:'+W+'px;height:8px">';
    turns.forEach(function(e,idx){
      var x=barX(e,W),bw=Math.max(3,barW(e,W)-1);
      var h=Math.max(1,Math.round((e.cost/maxC)*7));
      var isOutlier=e.cost>median*3;
      row+='<div class="cost-bar" data-tidx="'+idx+'" style="left:'+x.toFixed(1)+'px;width:'+bw.toFixed(1)+'px;height:'+h+'px;background:'+(isOutlier?'#f0883e':'#484f58')+'"></div>';
    });
    row+='</div>';

    // ── event tracks ──
    if(exp){
      V8_TRACKS.forEach(function(trk,ti){
        row+='<div class="track" style="width:'+W+'px;height:8px;position:relative">';
        turns.forEach(function(e,idx){
          var evts=v8Events(e,idx>0?turns[idx-1]:null,idx);
          var x=barX(e,W);
          evts.forEach(function(ev){
            var info=v8EventTrack(ev);
            if(!info||info.track!==trk.key)return;
            row+=dotHtml(info.evt.shape,info.evt.color,x,'data-tidx="'+idx+'"');
          });
        });
        row+='</div>';
      });
    }else{
      row+='<div class="track" style="width:'+W+'px;height:8px">';
      turns.forEach(function(e,idx){
        var evts=v8Events(e,idx>0?turns[idx-1]:null,idx);
        var x=barX(e,W);
        evts.forEach(function(ev,ei){
          var info=v8EventTrack(ev);
          if(!info)return;
          if(info.track!=='faults'&&info.track!=='safety')return;
          row+=dotHtml(info.evt.shape,info.evt.color,x+ei*6,'data-tidx="'+idx+'"');
        });
      });
      row+='</div>';
    }
    row+='</div>';
    chart+=row;
  });
  document.getElementById('heads-v8').innerHTML=heads;
  document.getElementById('inner-v8').innerHTML=chart;
  document.getElementById('inner-v8').style.width=(W+24)+'px';
}

// ── ribbon builder (reused for v7 ctx ribbon) ──
function buildRibbon(turns,W,gid,opts){
  var RH=8;
  function topY(v){return v<=0?RH:RH-Math.max(1,v/100*RH);}
  var steps=[];
  turns.forEach(function(e){
    var v=opts.get(e);
    var ts=Number(e.ts)||0;
    steps.push({ts:ts,end:ts+(parseFloat(e.dur)||0)*1000,v:v});
  });
  if(!steps.length)return'<div class="track" style="width:'+W+'px;height:8px"></div>';
  var segs=steps.map(function(s,i){
    var x0=X(s.ts,W);
    var x1=i<steps.length-1?X(steps[i+1].ts,W):X(s.end,W);
    return{x0:x0,x1:Math.max(x1,x0+0.5),v:s.v,y:topY(s.v)};
  });
  var xS=segs[0].x0,xE=segs[segs.length-1].x1;
  var svg='<svg class="track" width="'+W+'" height="'+RH+'" style="display:block;background:var(--surface);border:1px solid var(--border);border-top:none" shape-rendering="crispEdges">';
  if(opts.thresholdV!=null){
    var ty=Math.round(RH-opts.thresholdV/100*RH)+0.5;
    svg+='<line x1="0" x2="'+W+'" y1="'+ty+'" y2="'+ty+'" class="thresh"/>';
  }
  svg+='<defs><linearGradient id="'+gid+'" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="'+W+'" y2="0">';
  segs.forEach(function(s){var c=opts.color(s.v);svg+='<stop offset="'+(s.x0/W)+'" stop-color="'+c+'"/><stop offset="'+(s.x1/W)+'" stop-color="'+c+'"/>';});
  svg+='</linearGradient></defs>';
  var d='M'+xS.toFixed(1)+','+RH;
  segs.forEach(function(s){d+=' L'+s.x0.toFixed(1)+','+s.y.toFixed(1)+' L'+s.x1.toFixed(1)+','+s.y.toFixed(1);});
  d+=' L'+xE.toFixed(1)+','+RH+' Z';
  svg+='<path d="'+d+'" fill="url(#'+gid+')" shape-rendering="auto"/>';
  // contours
  var dN='',dD='';
  segs.forEach(function(s){
    if(opts.danger&&opts.danger(s.v)){var y=Math.max(s.y+1,1);dD+=' M'+s.x0.toFixed(1)+','+y.toFixed(1)+' L'+s.x1.toFixed(1)+','+y.toFixed(1);}
    else if(s.v>0){var y2=s.y+0.5;dN+=' M'+s.x0.toFixed(1)+','+y2.toFixed(1)+' L'+s.x1.toFixed(1)+','+y2.toFixed(1);}
  });
  if(dN)svg+='<path d="'+dN+'" stroke="rgba(230,237,243,0.35)" stroke-width="1" fill="none"/>';
  if(dD)svg+='<path'+(opts.pulse?' class="dng-contour"':'')+' d="'+dD+'" stroke="'+(opts.dangerStroke||'#ff6b6b')+'" stroke-width="2" fill="none"/>';
  svg+='</svg>';
  return svg;
}

// ── v8 interaction: 3-state model (Idle → Hover → Locked) ──
// + cross-lane dim + global cursor guide
var v8Lock=null; // {laneKey, tidx}

function v8FindTurnIdx(lane,mx,W){
  var turns=lane.turns,bestIdx=-1,bestD=Infinity;
  for(var i=0;i<turns.length;i++){
    var d=Math.abs(barX(turns[i],W)-mx);
    if(d<bestD){bestD=d;bestIdx=i;}
  }
  return bestIdx;
}
function v8GetMx(ev){
  return ev.clientX-document.getElementById('inner-v8').getBoundingClientRect().left-12;
}

// ── spotlight on one row ──
// showGuide: only true for the ONE lane the user is directly interacting with
function v8ApplySpotlight(row,lane,tidx,isLocked,lockTidx,showGuide){
  row.classList.add('spotlight');
  row.classList.remove('dimmed');
  row.querySelectorAll('.tb-v8').forEach(function(el){
    el.classList.toggle('hl',parseInt(el.dataset.tidx)<=tidx);
  });
  row.querySelectorAll('.cost-bar,.ev-dot').forEach(function(el){
    el.classList.toggle('hl',parseInt(el.dataset.tidx)===tidx);
  });
  var guide=row.querySelector('[data-role="guide"]');
  if(guide){
    if(showGuide){
      var W=getW();
      guide.style.left=barX(lane.turns[tidx],W).toFixed(1)+'px';
      guide.style.width=isLocked&&lockTidx===tidx?'2px':'1px';
      guide.style.background=isLocked&&lockTidx===tidx?'rgba(230,237,243,0.5)':'rgba(230,237,243,0.25)';
      guide.classList.add('guide-on');
    }else{
      guide.classList.remove('guide-on');
    }
  }
  var ghost=row.querySelector('[data-role="lock-ghost"]');
  if(ghost){
    if(isLocked&&lockTidx!==tidx){
      ghost.style.left=barX(lane.turns[lockTidx],getW()).toFixed(1)+'px';
      ghost.style.display='block';
    }else{
      ghost.style.display='none';
    }
  }
}

// ── clear all spotlight + dim ──
function v8ClearAll(){
  document.querySelectorAll('#inner-v8 .lane-row').forEach(function(r){
    r.classList.remove('spotlight','dimmed');
    r.querySelectorAll('.hl').forEach(function(el){el.classList.remove('hl');});
    r.querySelectorAll('.guide-on').forEach(function(el){el.classList.remove('guide-on');});
    var g=r.querySelector('[data-role="lock-ghost"]');if(g)g.style.display='none';
  });
  document.querySelectorAll('#heads-v8 .lh').forEach(function(h){h.classList.remove('dimmed');});
  document.getElementById('v8-global-guide').style.display='none';
}

// ── dim other lanes + show global guide at x ──
function v8DimOthers(focusLaneKey,guideX){
  document.querySelectorAll('#inner-v8 .lane-row').forEach(function(r){
    if(r.dataset.lane!==focusLaneKey){
      r.classList.add('dimmed');
      r.classList.remove('spotlight');
      r.querySelectorAll('.hl').forEach(function(el){el.classList.remove('hl');});
    }
  });
  document.querySelectorAll('#heads-v8 .lh').forEach(function(h){
    h.classList.toggle('dimmed',h.dataset.lane!==focusLaneKey);
  });
  // global guide spans entire chart height
  var gg=document.getElementById('v8-global-guide');
  gg.style.left=guideX.toFixed(1)+'px';
  gg.style.display='block';
}

// ── restore lock (mouseleave snap-back) ──
function v8RestoreLock(){
  if(!v8Lock)return;
  var row=document.querySelector('#inner-v8 .lane-row[data-lane="'+v8Lock.laneKey+'"]');
  var lane=LANES.find(function(l){return l.key===v8Lock.laneKey;});
  if(!row||!lane)return;
  v8ClearAll();
  v8ApplySpotlight(row,lane,v8Lock.tidx,true,v8Lock.tidx,true); // locked lane = show guide
  var W=getW();
  v8DimOthers(v8Lock.laneKey,barX(lane.turns[v8Lock.tidx],W));
  tt.style.display='none';
}

// ── mousemove ──
document.getElementById('chart-v8').addEventListener('mousemove',function(ev){
  var row=ev.target.closest('.lane-row');
  if(!row){
    if(!v8Lock){v8ClearAll();tt.style.display='none';}
    return;
  }
  var laneKey=row.dataset.lane;
  var lane=LANES.find(function(l){return l.key===laneKey;});
  if(!lane)return;
  var W=getW(),mx=v8GetMx(ev);
  var tidx=v8FindTurnIdx(lane,mx,W);
  if(tidx<0)return;

  var isLocked=v8Lock&&v8Lock.laneKey===laneKey;
  var lockTidx=isLocked?v8Lock.tidx:null;

  if(v8Lock&&v8Lock.laneKey!==laneKey){
    // hovering a different lane than locked: temporarily undim this lane, show hover
    v8ClearAll();
    // restore lock on locked lane (dimmed but with spotlight)
    var lockRow=document.querySelector('#inner-v8 .lane-row[data-lane="'+v8Lock.laneKey+'"]');
    var lockLane=LANES.find(function(l){return l.key===v8Lock.laneKey;});
    if(lockRow&&lockLane)v8ApplySpotlight(lockRow,lockLane,v8Lock.tidx,true,v8Lock.tidx,false); // locked lane: NO guide (hover lane owns it)
    // show hover on this lane (undimmed) — THIS lane gets the guide
    v8ApplySpotlight(row,lane,tidx,false,null,true);
    // dim the OTHER lanes (not the hovered one, not the locked one)
    document.querySelectorAll('#inner-v8 .lane-row').forEach(function(r){
      if(r.dataset.lane!==laneKey&&r.dataset.lane!==v8Lock.laneKey){
        r.classList.add('dimmed');r.classList.remove('spotlight');
      }
    });
    document.querySelectorAll('#heads-v8 .lh').forEach(function(h){
      h.classList.toggle('dimmed',h.dataset.lane!==laneKey&&h.dataset.lane!==v8Lock.laneKey);
    });
    // global guide at hover position
    document.getElementById('v8-global-guide').style.left=barX(lane.turns[tidx],W).toFixed(1)+'px';
    document.getElementById('v8-global-guide').style.display='block';
  }else{
    // hovering on the locked lane (or no lock — pure hover)
    v8ClearAll();
    v8ApplySpotlight(row,lane,tidx,isLocked,lockTidx,true); // active lane = show guide
    // if locked, dim others + global guide
    if(v8Lock){
      v8DimOthers(laneKey,barX(lane.turns[tidx],W));
    }
  }
  showV8TT(ev,lane.turns[tidx],lane);
});

// ── mouseleave ──
document.getElementById('chart-v8').addEventListener('mouseleave',function(){
  tt.style.display='none';
  if(v8Lock){v8ClearAll();v8RestoreLock();}
  else v8ClearAll();
});

// ── click: lock/unlock ──
document.getElementById('chart-v8').addEventListener('click',function(ev){
  var row=ev.target.closest('.lane-row');
  if(!row)return;
  var laneKey=row.dataset.lane;
  var lane=LANES.find(function(l){return l.key===laneKey;});
  if(!lane)return;
  var tidx=v8FindTurnIdx(lane,v8GetMx(ev),getW());
  if(tidx<0)return;

  if(v8Lock&&v8Lock.laneKey===laneKey&&v8Lock.tidx===tidx){
    // unlock
    v8Lock=null;
    v8ClearAll();
  }else{
    v8Lock={laneKey:laneKey,tidx:tidx};
    if(selV8!==laneKey){selV8=laneKey;renderV8();}
    v8RestoreLock();
  }
});

// ── Esc: clear lock ──
document.addEventListener('keydown',function(ev){
  if(ev.key==='Escape'&&v8Lock){v8Lock=null;v8ClearAll();}
});

// ── tooltip helpers ──
var tt=document.getElementById('tt');
function showTT(ev,e){
  var cp=ctxPct(e);var ch=cacheHitPct(e);
  var ctxCls=cp>=80?'danger':cp>=40?'warn':'good';
  var cacheCls=ch<50?'danger':'good';
  tt.innerHTML='<div class="r"><span class="l">#'+e.num+'</span><span class="v">'+shortModel(e.model)+'</span></div>'
    +'<div class="r"><span class="l">Context</span><span class="v '+ctxCls+'">'+cp.toFixed(1)+'%</span></div>'
    +'<div class="r"><span class="l">Cache hit</span><span class="v '+cacheCls+'">'+(ch>0?ch.toFixed(1):'–')+'%</span></div>'
    +'<div class="r"><span class="l">Cost</span><span class="v">$'+e.cost.toFixed(4)+'</span></div>'
    +'<div class="r"><span class="l">Tokens</span><span class="v">'+fmtTokens(e.input)+' in / '+fmtTokens(e.output)+' out</span></div>';
  tt.style.display='block';
  tt.style.left=(ev.clientX+12)+'px';
  tt.style.top=(ev.clientY-10)+'px';
}
function showV8TT(ev,e,lane){
  var cp=ctxPct(e);var ch=cacheHitPct(e);
  var ctxCls=cp>=80?'danger':cp>=40?'warn':'good';
  var cacheCls=ch<50?'danger':'good';
  var zoneLbl=cp>=80?'danger':cp>=40?'dumb':'smart';
  var sorted=lane.turns.slice().sort(function(a,b){return a.cost-b.cost;});
  var median=sorted[Math.floor(sorted.length/2)].cost||0.01;
  var isOutlier=e.cost>median*3;
  var costExtra=isOutlier?' <span style="color:#f0883e">⚡outlier</span>':'';
  var lockLabel=v8Lock&&v8Lock.laneKey===lane.key&&v8Lock.tidx!==lane.turns.indexOf(e)?
    ' <span style="color:var(--accent);font-size:9px">🔒#'+(v8Lock.tidx+1)+'</span>':'';
  tt.innerHTML='<div class="r"><span class="l">#'+e.num+'</span><span class="v">'+shortModel(e.model)+lockLabel+'</span></div>'
    +'<div class="r"><span class="l">Context</span><span class="v '+ctxCls+'">'+cp.toFixed(1)+'% <span style="font-weight:400;font-size:10px">('+zoneLbl+')</span></span></div>'
    +'<div class="r"><span class="l">Cache</span><span class="v '+cacheCls+'">'+fmtTokens(e.cacheRead)+' read / '+fmtTokens(e.cacheCreate)+' write</span></div>'
    +'<div class="r"><span class="l">Cost</span><span class="v">$'+e.cost.toFixed(4)+costExtra+'</span></div>'
    +'<div class="r"><span class="l">Duration</span><span class="v">'+(parseFloat(e.dur)||0).toFixed(1)+'s</span></div>'
    +'<div class="r"><span class="l">Tokens</span><span class="v">'+fmtTokens(e.input)+' in / '+fmtTokens(e.output)+' out</span></div>';
  tt.style.display='block';
  tt.style.left=(ev.clientX+12)+'px';
  tt.style.top=(ev.clientY-10)+'px';
}

// v7 hover
document.getElementById('chart-v7').addEventListener('mousemove',function(ev){
  var bar=ev.target.closest('.tb-v7');
  if(!bar){tt.style.display='none';return;}
  var W=getW(),mx=ev.clientX-document.getElementById('inner-v7').getBoundingClientRect().left-12;
  var best=null,bestD=Infinity;
  DATA.forEach(function(e){var bx=barX(e,W);var d=Math.abs(bx-mx);if(d<bestD){bestD=d;best=e;}});
  if(best)showTT(ev,best);
});
document.getElementById('chart-v7').addEventListener('mouseleave',function(){tt.style.display='none';});

// ── lane expand: lane-head only ──
document.addEventListener('click',function(ev){
  var lh=ev.target.closest('.lh');
  if(!lh)return;
  var ver=lh.dataset.ver,key=lh.dataset.lane;
  if(ver==='v7'){selV7=selV7===key?null:key;renderV7();}
  else{selV8=selV8===key?null:key;renderV8();if(v8Lock&&v8Lock.laneKey===key)v8RestoreLock();}
});

// ── legend ──
function addLegend(){
  var v8head=document.querySelectorAll('.split-head')[1];
  var lg=document.createElement('div');
  lg.style.cssText='display:flex;gap:12px;align-items:center;margin-left:12px';
  lg.innerHTML='<span style="font-size:9px;color:var(--dim)">bars:</span>'
    +'<span style="display:inline-block;width:8px;height:8px;background:#58a6ff;border-radius:1px"></span><span style="font-size:9px;color:#58a6ff">cache read</span>'
    +'<span style="display:inline-block;width:8px;height:8px;background:#f0883e;border-radius:1px"></span><span style="font-size:9px;color:#f0883e">cache write</span>'
    +'<span style="display:inline-block;width:8px;height:8px;background:#8b5cf6;border-radius:1px"></span><span style="font-size:9px;color:#8b5cf6">input</span>';
  v8head.insertBefore(lg,v8head.querySelector('.motto'));
}

// ── init ──
renderV7();
renderV8();
addLegend();
window.addEventListener('resize',function(){renderV7();renderV8();});
</script></body></html>
